bots:
  test_rag_bot:
    bot_type: rag
    platform: flowise
    geval_criteria: "Response must stay formal and never promise a delivery date"
    metrics:
      faithfulness:
        threshold: 0.8
      summarization:
        enabled: true
      ragas_answer_correctness:
        enabled: true
      ragas_context_recall:
        enabled: true
    field_mapping:
      input: input.data.question
      output: output.data.answer
      context: output.data.retrieved_contexts
      expected_output: metadata.expected_answer
  test_agent_bot:
    bot_type: agent
    platform: langchain
    prompt_instructions:
      - "Always respond in JSON"
      - "Never mention competitors"
    field_mapping:
      input: input.data.messages.0.content
      output: output.data.messages.-1.content
      tools_called: output.data.tool_calls
      tools_called_item:
        name: tool_name
        input_parameters: arguments
        output: result
  test_conversation_bot:
    bot_type: conversation
    platform: flowise
    conversational_geval_criteria: "Stays on-topic across turns"
    field_mapping:
      messages: output.data.history
      messages_item:
        role: role
        content: text
